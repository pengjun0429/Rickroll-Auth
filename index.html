<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>驗證系統 - 偵錯版</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #111; padding: 30px; border-radius: 15px; border: 1px solid #333; width: 400px; text-align: center; }
        .hidden { display: none; }
        #debug-log { color: #555; font-size: 10px; margin-top: 20px; text-align: left; border-top: 1px solid #222; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <div id="login-ui">
            <h2>身分驗證</h2>
            <div id="g_id_onload"
                 data-client_id="288551415215-r9onljnhvjirv3bri4acpt72m3a1ma19.apps.googleusercontent.com"
                 data-callback="handleSignIn"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin" data-type="standard"></div>
        </div>

        <div id="status"></div>
        <div id="main" class="hidden">
            <h3>✅ 驗證成功</h3>
            <iframe id="player" width="100%" height="200" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
        
        <div id="debug-log">Log: 等待登入...</div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzKzgpY7boL0XmxrQ6JNPssQAUj1K9A1UH90VCVjhqJ59kFHbXvrzgyfMlKpXcNSPn6/exec";

        function log(msg) {
            document.getElementById('debug-log').innerHTML += "<br>> " + msg;
            console.log(msg);
        }

        function handleSignIn(response) {
            log("收到 Google 憑證");
            document.getElementById('login-ui').classList.add('hidden');
            document.getElementById('status').innerHTML = "📡 正在聯繫伺服器...";

            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            const email = payload.email.toLowerCase();
            log("準備驗證 Email: " + email);

            // 設定 10 秒強制逾時
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000);

            log("發起 Fetch 請求...");
            fetch(`${GAS_URL}?check=${email}`, { signal: controller.signal })
                .then(res => {
                    clearTimeout(timeoutId);
                    log("收到伺服器回應 (Status: " + res.status + ")");
                    return res.json();
                })
                .then(data => {
                    log("JSON 解析成功: " + JSON.stringify(data));
                    if (data.isAllowed) {
                        document.getElementById('status').innerHTML = "";
                        document.getElementById('main').classList.remove('hidden');
                        document.getElementById('player').src = "https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1";
                    } else {
                        log("存取遭拒");
                        alert("未獲授權");
                        location.reload();
                    }
                })
                .catch(err => {
                    log("❌ 錯誤: " + err.message);
                    document.getElementById('status').innerHTML = "連線失敗：" + err.message;
                });
        }
    </script>
</body>
</html>
