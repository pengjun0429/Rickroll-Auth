<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私有驗證系統</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .card { background: #0a0a0a; padding: 40px; border-radius: 16px; border: 1px solid #222; width: 380px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .hidden { display: none; }
        .video-box { position: relative; padding-bottom: 56.25%; height: 0; margin-top: 20px; border-radius: 8px; overflow: hidden; background: #000; border: 1px solid #333; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        #status { color: #888; font-size: 13px; margin-top: 20px; min-height: 20px; }
        .admin-panel { border-top: 1px solid #222; margin-top: 30px; padding-top: 20px; text-align: left; }
        input { background: #111; border: 1px solid #333; color: #fff; padding: 8px; border-radius: 4px; width: 60%; margin-bottom: 10px; }
        button { background: #1a73e8; color: #fff; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        ul { list-style: none; padding: 0; font-size: 12px; }
        li { background: #161616; padding: 8px 12px; margin-bottom: 6px; display: flex; justify-content: space-between; border-radius: 4px; align-items: center; }
        .del-btn { background: #c53030; font-size: 10px; padding: 3px 8px; }
    </style>
</head>
<body>
    <div class="card">
        <div id="login-area">
            <h2 style="letter-spacing: 1px; color: #eee;">身份驗證</h2>
            <div id="g_id_onload"
                 data-client_id="288551415215-r9onljnhvjirv3bri4acpt72m3a1ma19.apps.googleusercontent.com"
                 data-callback="onSignIn"
                 data-auto_prompt="false">
            </div>
            <div style="display:flex; justify-content:center; margin-top:20px;">
                <div class="g_id_signin" data-type="standard" data-theme="filled_black"></div>
            </div>
        </div>

        <div id="status"></div>

        <div id="content-area" class="hidden">
            <h3 style="color: #4ade80;">✅ 驗證通過</h3>
            <div class="video-box">
                <iframe id="video-frame" 
                        src="" 
                        allow="autoplay; encrypted-media; picture-in-picture" 
                        allowfullscreen>
                </iframe>
            </div>

            <div id="admin-ui" class="hidden">
                <div class="admin-panel">
                    <p style="font-size:12px; color:#666; margin-bottom: 10px;">使用者授權管理</p>
                    <input type="email" id="new-email" placeholder="輸入 Email...">
                    <button onclick="addUser()">新增</button>
                    <ul id="user-list"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 確保這是你最新的 GAS 網址
        const API_URL = "https://script.google.com/macros/s/AKfycbzKzgpY7boL0XmxrQ6JNPssQAUj1K9A1UH90VCVjhqJ59kFHbXvrzgyfMlKpXcNSPn6/exec";

        function onSignIn(resp) {
            document.getElementById('login-area').classList.add('hidden');
            document.getElementById('status').innerText = "📡 權限驗證中...";

            try {
                // 安全解析 Google 憑證
                const base64 = resp.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
                const email = JSON.parse(jsonPayload).email.toLowerCase();

                fetch(`${API_URL}?check=${email}`)
                    .then(r => r.json())
                    .then(data => {
                        document.getElementById('status').innerText = "";
                        if (data.isAllowed) {
                            document.getElementById('content-area').classList.remove('hidden');
                            
                            // 影片 ID：dQw4w9WgXcQ (Rickroll)
                            // 參數說明：
                            // rel=0 (不顯示推薦影片)
                            // modestbranding=1 (隱藏 YouTube Logo)
                            // iv_load_policy=3 (隱藏影片中的註解)
                            const videoId = "dQw4w9WgXcQ";
                            document.getElementById('video-frame').src = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1&iv_load_policy=3`;
                            
                            if (data.isAdmin) {
                                document.getElementById('admin-ui').classList.remove('hidden');
                                renderList(data.whitelist);
                            }
                        } else {
                            alert("抱歉，您不在授權名單中：" + email);
                            location.reload();
                        }
                    })
                    .catch(() => {
                        document.getElementById('status').innerText = "❌ 連線失敗，請檢查 API 部署。";
                    });
            } catch (e) {
                document.getElementById('status').innerText = "⚠️ 憑證解析失敗。";
            }
        }

        function renderList(list) {
            document.getElementById('user-list').innerHTML = list.map(u => `
                <li>${u} <button class="del-btn" onclick="delUser('${u}')">移除</button></li>
            `).join('');
        }

        function addUser() {
            const e = document.getElementById('new-email').value.trim();
            if(e) fetch(`${API_URL}?action=add&email=${e}`).then(() => location.reload());
        }

        function delUser(e) {
            if(confirm('確定要移除此使用者？')) fetch(`${API_URL}?action=remove&email=${e}`).then(() => location.reload());
        }
    </script>
</body>
</html>
