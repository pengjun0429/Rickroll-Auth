<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Google 驗證系統</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #111; padding: 40px; border-radius: 20px; border: 1px solid #333; width: 450px; text-align: center; }
        .hidden { display: none; }
        .video-box { position: relative; padding-bottom: 56.25%; height: 0; margin-top: 20px; border-radius: 10px; overflow: hidden; border: 1px solid #444; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        button { background: #1a73e8; color: #fff; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .admin-area { text-align: left; margin-top: 20px; border-top: 1px solid #333; padding-top: 20px; }
        li { background: #222; margin: 5px 0; padding: 8px; border-radius: 5px; display: flex; justify-content: space-between; font-size: 13px; }
    </style>
</head>
<body>
    <div class="card">
        <div id="login-ui">
            <h2 style="color: #1a73e8;">身分驗證</h2>
            <div id="g_id_onload"
                 data-client_id="288551415215-r9onljnhvjirv3bri4acpt72m3a1ma19.apps.googleusercontent.com"
                 data-callback="handleSignIn"
                 data-auto_prompt="false">
            </div>
            <div style="display: flex; justify-content: center; margin-top: 20px;">
                <div class="g_id_signin" data-type="standard"></div>
            </div>
        </div>

        <div id="loader" class="hidden">📡 正在聯繫 API 伺服器...</div>

        <div id="main" class="hidden">
            <h2 style="color: #1a73e8;">✅ 驗證成功</h2>
            <div class="video-box">
                <iframe id="player" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>

            <div id="admin-ui" class="hidden">
                <div class="admin-area">
                    <hr>
                    <h4>🛠 管理員控制台</h4>
                    <input type="email" id="new-mail" placeholder="輸入 Email" style="padding:5px; width:60%;">
                    <button onclick="add()">新增</button>
                    <ul id="list" style="padding:0; list-style:none;"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ 已經替換為你剛才提供的最新網址
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzKzgpY7boL0XmxrQ6JNPssQAUj1K9A1UH90VCVjhqJ59kFHbXvrzgyfMlKpXcNSPn6/exec";

        function handleSignIn(response) {
            document.getElementById('login-ui').classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');

            // 解析 JWT
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            const email = payload.email.toLowerCase();

            // 呼叫 API
            fetch(`${GAS_URL}?check=${email}`)
                .then(res => {
                    if (!res.ok) throw new Error('網路回應不正常');
                    return res.json();
                })
                .then(data => {
                    document.getElementById('loader').classList.add('hidden');
                    if (data.isAllowed) {
                        document.getElementById('main').classList.remove('hidden');
                        document.getElementById('player').src = "https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1";
                        if (data.isAdmin) {
                            document.getElementById('admin-ui').classList.remove('hidden');
                            document.getElementById('list').innerHTML = data.whitelist.map(e => 
                                `<li style="display:flex; justify-content:space-between; margin-bottom:5px; background:#222; padding:5px; border-radius:3px;">
                                    ${e} <button onclick="del('${e}')" style="background:#d93025; padding:2px 5px; font-size:10px;">移除</button>
                                </li>`
                            ).join('');
                        }
                    } else {
                        alert("存取遭拒：" + email);
                        location.reload();
                    }
                })
                .catch(err => {
                    document.getElementById('loader').innerHTML = "❌ 連線失敗，請檢查 API 部署或防毒軟體。";
                    console.error(err);
                });
        }

        function add() {
            const e = document.getElementById('new-mail').value;
            fetch(`${GAS_URL}?action=add&email=${e}`).then(() => location.reload());
        }

        function del(e) {
            if(confirm('確定移除 ' + e + ' ?')) fetch(`${GAS_URL}?action=remove&email=${e}`).then(() => location.reload());
        }
    </script>
</body>
</html>
